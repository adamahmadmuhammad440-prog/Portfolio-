<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Page title</title>

    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media</title>

    <style>
        body {
            background-color: #0b2b5e; /* Deep Blue */
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        h1, h2 {
            color: #ffffff; /* White */
        }

        p {
            color: #e0f0ff; /* Light Blue */
        }

        img {
            width: 300px;
            border: 4px solid #4a9eff; /* Light Blue border */
            border-radius: 10px;
        }

        audio, video {
            width: 300px;
            margin-top: 10px;
        }

      
        a {
            color: #7bbaff;
        }

        a:hover {
            color: #b0d4ff;
        }

        .highlight {
            background-color: #1a4a8a;
            color: white;
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>
</head>
<body>
    <h1>Media</h1>
    <p>here you will see my image,video and audio</p>

    <h2>Image</h2>
    <img src="image.jpg.jpeg" alt="my picture">
       
    <h2>video</h2>
     <video controls loop> 
        <source src="video.mp4" type="video/mp4"></source>
     </video>
     
     <h2>Audio</h2>
    <audio controls loop>
        <source src="audio.mp3" type="audio/mp3"></source>
    </audio>
<br><br>

<br>
</body>
</html>
